<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#ffffff",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            input:-webkit-autofill,
            input:-webkit-autofill:hover, 
            input:-webkit-autofill:focus {
                -webkit-box-shadow: 0 0 0px 1000px white inset;
                transition: background-color 5000s ease-in-out 0s;
            }
            .dark input:-webkit-autofill {
                -webkit-box-shadow: 0 0 0px 1000px #1e293b inset;
                -webkit-text-fill-color: white;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/20">
<main class="relative flex min-h-screen w-full flex-col items-center justify-center px-8 py-12">
<div class="mb-16 flex flex-col items-center opacity-40">
<div class="size-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-2xl">package_2</span>
</div>
</div>
<div class="w-full max-w-sm">
<header class="mb-12 text-center">
<h1 class="text-4xl font-light tracking-tight text-slate-900 dark:text-white mb-3">Create account</h1>
<p class="text-slate-400 text-sm font-normal">Please enter your details to continue.</p>
</header>
<form class="space-y-10" onsubmit="event.preventDefault();">
<div class="group">
<label class="block text-xs font-semibold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-4 ml-1">Full Name</label>
<input autofocus="" class="w-full bg-transparent border-0 border-b border-slate-200 dark:border-slate-800 focus:border-primary focus:ring-0 text-2xl py-3 px-1 transition-all placeholder:text-slate-200 dark:placeholder:text-slate-700" placeholder="Type your name..." type="text"/>
</div>
<div class="group">
<label class="block text-xs font-semibold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-4 ml-1">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-slate-200 dark:border-slate-800 focus:border-primary focus:ring-0 text-2xl py-3 px-1 transition-all placeholder:text-slate-200 dark:placeholder:text-slate-700" placeholder="email@example.com" type="email"/>
</div>
<div class="pt-8">
<button class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-medium h-16 rounded-full transition-all hover:opacity-90 active:scale-[0.98] flex items-center justify-center group">
<span class="text-lg">Register</span>
<span class="material-symbols-outlined ml-2 transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</form>
<p class="mt-12 text-center text-[11px] text-slate-400 leading-relaxed max-w-[240px] mx-auto">
                By continuing, you agree to the 
                <a class="underline underline-offset-4 hover:text-primary" href="#">Terms</a> and 
                <a class="underline underline-offset-4 hover:text-primary" href="#">Privacy Policy</a>.
            </p>
</div>
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-slate-100 dark:via-slate-800 to-transparent opacity-50"></div>
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex gap-1.5 pointer-events-none">
<div class="size-1 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="size-1 rounded-full bg-slate-200 dark:bg-slate-800"></div>
<div class="size-1 rounded-full bg-slate-200 dark:bg-slate-800"></div>
</div>
</main>

</body></html>
