<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>User Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<!-- Mobile Container -->
<div class="relative flex h-full min-h-screen w-full mx-auto max-w-md flex-col bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl">
<!-- Status Bar Area (Simulated for iOS feel) -->
<div class="h-10 w-full bg-background-light dark:bg-background-dark shrink-0"></div>
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark px-4 py-2 justify-between sticky top-0 z-10">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Create Account</h2>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto pb-8">
<!-- Hero / Logo Area -->
<div class="@container px-4 py-6">
<div class="w-full relative bg-blue-50 dark:bg-slate-800 rounded-xl overflow-hidden aspect-[16/9] flex items-center justify-center shadow-sm border border-slate-200 dark:border-slate-700">
<!-- Background pattern decoration -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(#13a4ec_1px,transparent_1px)] [background-size:16px_16px]"></div>
<!-- Abstract Illustration -->
<div class="relative z-10 flex flex-col items-center gap-3">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">inventory_2</span>
</div>
<p class="text-sm font-medium text-slate-500 dark:text-slate-400">Shipping Inspector Pro</p>
</div>
</div>
</div>
<div class="px-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight pb-2 pt-2">Welcome Aboard</h1>
<p class="text-slate-500 dark:text-slate-400 text-base mb-8">Sign up to start your first inspection.</p>
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Full Name Input -->
<label class="flex flex-col gap-2 group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal ml-1 group-focus-within:text-primary transition-colors">Full Name</span>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white h-12 pl-11 pr-4 focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 transition-all shadow-sm" placeholder="John Doe" type="text"/>
</div>
</label>
<!-- Email Address Input -->
<label class="flex flex-col gap-2 group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal ml-1 group-focus-within:text-primary transition-colors">Email Address</span>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white h-12 pl-11 pr-4 focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 transition-all shadow-sm" placeholder="john@shipping.com" type="email"/>
</div>
</label>
<!-- Password Input (Added for completeness of a registration flow) -->
<label class="flex flex-col gap-2 group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal ml-1 group-focus-within:text-primary transition-colors">Password</span>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white h-12 pl-11 pr-12 focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-slate-400 transition-all shadow-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Terms Checkbox -->
<label class="flex items-start gap-3 mt-2 cursor-pointer">
<input class="rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary bg-white dark:bg-slate-800 mt-1" type="checkbox"/>
<span class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                             By registering, you agree to our <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                         </span>
</label>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-sky-500 text-white font-semibold h-12 rounded-lg shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98] mt-2 flex items-center justify-center gap-2">
<span>Register</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline ml-1" href="#">Log in</a>
</p>
</div>
</div>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-6 w-full shrink-0"></div>
</div>
</body></html>
